name: Set up project
description: Check out the repo, install uv with Python 3.11, and sync the project.

inputs:
  extras:
    description: Optional comma-separated list of extras to install (e.g. "test").
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install uv
      # astral-sh/setup-uv v5.4.2 — pinned by SHA per GitHub's third-party
      # action hardening guidance (tags are mutable and can be retargeted).
      # Bump with: gh api repos/astral-sh/setup-uv/git/refs/tags/<tag>
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      with:
        python-version: "3.11"

    - name: Sync project
      shell: bash
      run: |
        if [ -n "${{ inputs.extras }}" ]; then
          uv sync --extra "${{ inputs.extras }}"
        else
          uv sync
        fi
